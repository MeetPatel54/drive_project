<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drive Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #666;
      --danger: #ff4444;
      --radius: 4px;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .filter-tabs {
      display: flex;
      gap: 2px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3px;
    }

    .filter-tab {
      padding: 5px 14px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }
    .filter-tab.active {
      background: var(--accent);
      color: #000;
      font-weight: 600;
    }

    /* ── UPLOAD BUTTON ── */
    .btn-upload {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }
    .btn-upload:hover { background: #d4eb00; transform: translateY(-1px); }

    /* ── MAIN ── */
    main {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-value {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .stats-bar .sep { color: var(--border); font-size: 1.5rem; }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .card {
      background: var(--surface);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: background 0.15s;
      animation: fadeIn 0.3s ease both;
    }
    .card:hover { background: var(--surface2); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-media {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }

    .card-video-thumb {
      width: 100%;
      aspect-ratio: 16/10;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .play-icon {
      width: 48px;
      height: 48px;
      background: rgba(232,255,71,0.15);
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .play-icon svg { margin-left: 3px; }

    .card-body {
      padding: 14px;
    }

    .card-type {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .card-type.image { color: var(--accent); }
    .card-type.video { color: var(--accent2); }

    .card-name {
      font-family: var(--font-head);
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .card-meta {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .card-folder {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.7;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
    }

    .btn-action {
      flex: 1;
      padding: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: var(--radius);
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }
    .btn-action:hover { border-color: var(--text); color: var(--text); }
    .btn-action.view:hover { border-color: var(--accent); color: var(--accent); }
    .btn-action.edit:hover { border-color: #88aaff; color: #88aaff; }
    .btn-action.del:hover  { border-color: var(--danger); color: var(--danger); }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1/-1;
      padding: 6rem 2rem;
      text-align: center;
    }
    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.3;
    }
    .empty h3 {
      font-family: var(--font-head);
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      color: var(--muted);
    }
    .empty p { font-size: 0.8rem; color: var(--muted); }

    /* ── LOADING ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── MODAL OVERLAY ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 480px;
      transform: translateY(16px);
      transition: transform 0.2s;
    }
    .overlay.open .modal { transform: translateY(0); }

    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 1rem;
    }
    .btn-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      transition: color 0.15s;
    }
    .btn-close:hover { color: var(--text); }

    .modal-body { padding: 24px; }

    /* ── FORM ── */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .field input, .field textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 10px 12px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 80px; }

    /* ── DROP ZONE ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(232,255,71,0.03);
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .drop-icon { font-size: 2rem; margin-bottom: 8px; }
    .drop-text { font-size: 0.8rem; color: var(--muted); }
    .drop-text strong { color: var(--accent); }
    .drop-selected {
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--text);
      padding: 8px 12px;
      background: var(--surface2);
      border-radius: var(--radius);
    }

    /* ── PROGRESS ── */
    .progress-wrap {
      margin-top: 14px;
      display: none;
    }
    .progress-wrap.show { display: block; }
    .progress-bar-bg {
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s;
    }
    .progress-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 6px;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      padding: 9px 20px;
      border-radius: var(--radius);
      font-family: var(--font-head);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .btn-ghost {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); }
    .btn-primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: #d4eb00; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }
    .btn-danger:hover { background: #cc0000; }

    /* ── VIEW MODAL ── */
    .view-modal { max-width: 800px; }
    .view-media-wrap {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      max-height: 500px;
      overflow: hidden;
    }
    .view-media-wrap img {
      max-width: 100%;
      max-height: 500px;
      object-fit: contain;
      display: block;
    }
    .view-media-wrap video {
      max-width: 100%;
      max-height: 500px;
    }
    .view-info {
      padding: 20px 24px;
    }
    .view-info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
    }
    .view-info-row:last-child { border-bottom: none; }
    .view-info-key { color: var(--muted); }
    .view-info-val { color: var(--text); text-align: right; max-width: 60%; word-break: break-all; }

    /* ── TOAST ── */
    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 12px 18px;
      border-radius: var(--radius);
      font-size: 0.8rem;
      font-family: var(--font-mono);
      border-left: 3px solid;
      background: var(--surface);
      border-color: var(--border);
      animation: slideIn 0.2s ease;
      max-width: 300px;
    }
    .toast.success { border-color: var(--accent); color: var(--accent); }
    .toast.error   { border-color: var(--danger); color: var(--danger); }
    .toast.info    { border-color: #88aaff; color: #88aaff; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── DELETE CONFIRM ── */
    .delete-modal { max-width: 380px; }
    .delete-msg {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .delete-msg strong { color: var(--text); }

    /* ── LOAD MORE ── */
    .load-more-wrap {
      text-align: center;
      margin-top: 2rem;
    }
    .btn-load-more {
      padding: 10px 28px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: var(--radius);
      transition: all 0.15s;
    }
    .btn-load-more:hover { border-color: var(--text); color: var(--text); }

    @media (max-width: 640px) {
      header { padding: 0 1rem; }
      main { padding: 1rem; }
      .stats-bar { gap: 1rem; }
      .header-right { gap: 0.5rem; }
      .filter-tab { padding: 5px 10px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────── -->
<header>
  <div class="logo">drive<span>.</span>media</div>
  <div class="header-right">
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="image">Images</button>
      <button class="filter-tab" data-filter="video">Videos</button>
    </div>
    <button class="btn-upload" onclick="openUploadModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload
    </button>
  </div>
</header>

<!-- ── MAIN ───────────────────────────────────────── -->
<main>
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value" id="stat-total">—</span>
      <span class="stat-label">Total Files</span>
    </div>
    <span class="sep">·</span>
    <div class="stat">
      <span class="stat-value" id="stat-images">—</span>
      <span class="stat-label">Images</span>
    </div>
    <span class="sep">·</span>
    <div class="stat">
      <span class="stat-value" id="stat-videos">—</span>
      <span class="stat-label">Videos</span>
    </div>
  </div>

  <div class="grid" id="grid">
    <!-- cards injected here -->
  </div>

  <div class="load-more-wrap" id="load-more-wrap" style="display:none">
    <button class="btn-load-more" onclick="loadMore()">Load more</button>
  </div>
</main>

<!-- ── UPLOAD MODAL ────────────────────────────────── -->
<div class="overlay" id="upload-overlay" onclick="overlayClick(event,'upload-overlay')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Upload Media</span>
      <button class="btn-close" onclick="closeModal('upload-overlay')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>File</label>
        <div class="drop-zone" id="drop-zone">
          <input type="file" id="file-input" accept="image/*,video/*" onchange="onFileSelect(this)">
          <div class="drop-icon">📁</div>
          <div class="drop-text">Drop file here or <strong>browse</strong></div>
          <div class="drop-text" style="margin-top:4px;font-size:0.7rem">Images & videos up to 500 MB</div>
          <div class="drop-selected" id="file-selected" style="display:none"></div>
        </div>
      </div>
      <div class="field">
        <label>Name <span style="color:var(--muted)">(optional)</span></label>
        <input type="text" id="upload-name" placeholder="Leave blank to use filename">
      </div>
      <div class="field">
        <label>Description <span style="color:var(--muted)">(optional)</span></label>
        <textarea id="upload-desc" placeholder="Add a description..."></textarea>
      </div>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="progress-label" id="progress-label">Uploading...</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('upload-overlay')">Cancel</button>
      <button class="btn btn-primary" id="btn-do-upload" onclick="doUpload()">Upload</button>
    </div>
  </div>
</div>

<!-- ── EDIT MODAL ──────────────────────────────────── -->
<div class="overlay" id="edit-overlay" onclick="overlayClick(event,'edit-overlay')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Edit File</span>
      <button class="btn-close" onclick="closeModal('edit-overlay')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="field">
        <label>Name</label>
        <input type="text" id="edit-name">
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="edit-desc"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('edit-overlay')">Cancel</button>
      <button class="btn btn-primary" onclick="doEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- ── DELETE MODAL ────────────────────────────────── -->
<div class="overlay" id="delete-overlay" onclick="overlayClick(event,'delete-overlay')">
  <div class="modal delete-modal">
    <div class="modal-header">
      <span class="modal-title">Delete File</span>
      <button class="btn-close" onclick="closeModal('delete-overlay')">✕</button>
    </div>
    <div class="modal-body">
      <p class="delete-msg">Are you sure you want to delete <strong id="delete-name"></strong>? This will permanently remove it from Google Drive.</p>
    </div>
    <div class="modal-footer">
      <input type="hidden" id="delete-id">
      <button class="btn btn-ghost" onclick="closeModal('delete-overlay')">Cancel</button>
      <button class="btn btn-danger" onclick="doDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- ── VIEW MODAL ──────────────────────────────────── -->
<div class="overlay" id="view-overlay" onclick="overlayClick(event,'view-overlay')">
  <div class="modal view-modal">
    <div class="modal-header">
      <span class="modal-title" id="view-title">View</span>
      <button class="btn-close" onclick="closeModal('view-overlay')">✕</button>
    </div>
    <div class="view-media-wrap" id="view-media-wrap"></div>
    <div class="view-info" id="view-info"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('view-overlay')">Close</button>
      <a id="view-drive-link" href="#" target="_blank" class="btn btn-primary" style="text-decoration:none">Open in Drive ↗</a>
    </div>
  </div>
</div>

<!-- ── TOAST CONTAINER ─────────────────────────────── -->
<div class="toast-container" id="toast-container"></div>

<script>
  const API = '/api/media';
  let allFiles = [];
  let nextPageToken = null;
  let currentFilter = 'all';

  // ── INIT ────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    loadMedia();
    setupFilterTabs();
    setupDragDrop();
  });

  // ── FETCH & RENDER ──────────────────────────────────
  async function loadMedia(reset = true) {
    if (reset) {
      allFiles = [];
      nextPageToken = null;
      renderSkeletons();
    }

    try {
      const mimeParam = currentFilter !== 'all' ? `&mimeType=${currentFilter}` : '';
      const pageParam = nextPageToken ? `&pageToken=${nextPageToken}` : '';
      const res = await fetch(`${API}?pageSize=24${mimeParam}${pageParam}`);
      const data = await res.json();

      if (!data.success) throw new Error(data.error);

      allFiles = reset ? data.data : [...allFiles, ...data.data];
      nextPageToken = data.nextPageToken;

      renderGrid();
      updateStats();

      document.getElementById('load-more-wrap').style.display = nextPageToken ? 'block' : 'none';
    } catch (e) {
      showToast('Failed to load media: ' + e.message, 'error');
      document.getElementById('grid').innerHTML = `
        <div class="empty">
          <div class="empty-icon">⚠️</div>
          <h3>Could not load files</h3>
          <p>${e.message}</p>
        </div>`;
    }
  }

  function loadMore() {
    loadMedia(false);
  }

  function renderSkeletons() {
    const grid = document.getElementById('grid');
    grid.innerHTML = Array(8).fill('').map(() => `
      <div class="card">
        <div class="skeleton" style="aspect-ratio:16/10;width:100%"></div>
        <div style="padding:14px">
          <div class="skeleton" style="height:10px;width:40%;margin-bottom:8px;border-radius:2px"></div>
          <div class="skeleton" style="height:14px;width:80%;margin-bottom:4px;border-radius:2px"></div>
          <div class="skeleton" style="height:10px;width:55%;border-radius:2px"></div>
        </div>
      </div>
    `).join('');
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    if (allFiles.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📂</div>
          <h3>No files yet</h3>
          <p>Upload your first image or video to get started.</p>
        </div>`;
      return;
    }

    grid.innerHTML = allFiles.map((f, i) => `
      <div class="card" style="animation-delay:${i * 30}ms">
        ${f.type === 'image'
          ? `<img class="card-media" src="/api/media/${f.id}/stream" alt="${esc(f.name)}" loading="lazy" onerror="this.style.opacity='0.3'"/>`
          : `<div class="card-video-thumb"><div class="play-icon"><svg width="16" height="16" fill="var(--accent)" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>`
        }
        <div class="card-body">
          <div class="card-type ${f.type}">${f.type === 'image' ? '◆ IMAGE' : '▶ VIDEO'}</div>
          <div class="card-name" title="${esc(f.name)}">${esc(f.name)}</div>
          <div class="card-meta">${f.size ? formatBytes(f.size) + ' · ' : ''}${formatDate(f.createdAt)}</div>
          ${f.folder ? `<div class="card-folder">📁 ${esc(f.folder)}</div>` : ''}
        </div>
        <div class="card-actions">
          <button class="btn-action view" onclick="openView('${f.id}')">View</button>
          <button class="btn-action edit" onclick="openEdit('${f.id}')">Edit</button>
          <button class="btn-action del"  onclick="openDelete('${f.id}','${esc(f.name)}')">Delete</button>
        </div>
      </div>
    `).join('');
  }

  function updateStats() {
    document.getElementById('stat-total').textContent  = allFiles.length;
    document.getElementById('stat-images').textContent = allFiles.filter(f => f.type === 'image').length;
    document.getElementById('stat-videos').textContent = allFiles.filter(f => f.type === 'video').length;
  }

  // ── FILTER TABS ─────────────────────────────────────
  function setupFilterTabs() {
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        loadMedia();
      });
    });
  }

  // ── UPLOAD ──────────────────────────────────────────
  function openUploadModal() {
    document.getElementById('file-input').value = '';
    document.getElementById('file-selected').style.display = 'none';
    document.getElementById('upload-name').value = '';
    document.getElementById('upload-desc').value = '';
    document.getElementById('progress-wrap').classList.remove('show');
    document.getElementById('btn-do-upload').disabled = false;
    openModal('upload-overlay');
  }

  function onFileSelect(input) {
    const file = input.files[0];
    if (!file) return;
    const sel = document.getElementById('file-selected');
    sel.textContent = `${file.name} (${formatBytes(file.size)})`;
    sel.style.display = 'block';
  }

  async function doUpload() {
    const fileInput = document.getElementById('file-input');
    if (!fileInput.files[0]) { showToast('Please select a file', 'error'); return; }

    const btn = document.getElementById('btn-do-upload');
    btn.disabled = true;

    const progressWrap = document.getElementById('progress-wrap');
    const progressBar  = document.getElementById('progress-bar');
    const progressLabel = document.getElementById('progress-label');
    progressWrap.classList.add('show');

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    const name = document.getElementById('upload-name').value.trim();
    const desc = document.getElementById('upload-desc').value.trim();
    if (name) formData.append('name', name);
    if (desc) formData.append('description', desc);

    try {
      // Fake progress animation
      let fakeProgress = 0;
      const fakeInterval = setInterval(() => {
        fakeProgress = Math.min(fakeProgress + Math.random() * 15, 85);
        progressBar.style.width = fakeProgress + '%';
        progressLabel.textContent = `Uploading to Google Drive... ${Math.round(fakeProgress)}%`;
      }, 300);

      const res = await fetch(API, { method: 'POST', body: formData });
      const data = await res.json();

      clearInterval(fakeInterval);

      if (!data.success) throw new Error(data.error);

      progressBar.style.width = '100%';
      progressLabel.textContent = 'Upload complete!';

      setTimeout(() => {
        closeModal('upload-overlay');
        showToast('File uploaded successfully', 'success');
        loadMedia();
      }, 400);
    } catch (e) {
      showToast('Upload failed: ' + e.message, 'error');
      progressWrap.classList.remove('show');
      btn.disabled = false;
    }
  }

  // ── DRAG & DROP ─────────────────────────────────────
  function setupDragDrop() {
    const zone = document.getElementById('drop-zone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) {
        const dt = new DataTransfer();
        dt.items.add(file);
        document.getElementById('file-input').files = dt.files;
        onFileSelect(document.getElementById('file-input'));
      }
    });
  }

  // ── VIEW ─────────────────────────────────────────────
  async function openView(id) {
    const file = allFiles.find(f => f.id === id);
    if (!file) return;

    document.getElementById('view-title').textContent = file.name;
    document.getElementById('view-drive-link').href = file.urls.view;

    const wrap = document.getElementById('view-media-wrap');
    if (file.type === 'image') {
      wrap.innerHTML = `<img src="/api/media/${file.id}/stream" alt="${esc(file.name)}" style="max-width:100%;max-height:500px;object-fit:contain">`;
    } else {
      wrap.innerHTML = `<video controls style="max-width:100%;max-height:500px" src="/api/media/${file.id}/stream"></video>`;
    }

    document.getElementById('view-info').innerHTML = `
      <div class="view-info-row"><span class="view-info-key">Type</span><span class="view-info-val">${file.mimeType}</span></div>
      <div class="view-info-row"><span class="view-info-key">Size</span><span class="view-info-val">${file.size ? formatBytes(file.size) : '—'}</span></div>
      ${file.folder ? `<div class="view-info-row"><span class="view-info-key">Hour folder</span><span class="view-info-val">📁 ${esc(file.folder)}</span></div>` : ''}
      ${file.description ? `<div class="view-info-row"><span class="view-info-key">Description</span><span class="view-info-val">${esc(file.description)}</span></div>` : ''}
      <div class="view-info-row"><span class="view-info-key">Uploaded</span><span class="view-info-val">${formatDate(file.createdAt)}</span></div>
      <div class="view-info-row"><span class="view-info-key">File ID</span><span class="view-info-val" style="font-size:0.7rem">${file.id}</span></div>
    `;

    openModal('view-overlay');
  }

  // ── EDIT ─────────────────────────────────────────────
  function openEdit(id) {
    const file = allFiles.find(f => f.id === id);
    if (!file) return;
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-name').value = file.name;
    document.getElementById('edit-desc').value = file.description || '';
    openModal('edit-overlay');
  }

  async function doEdit() {
    const id   = document.getElementById('edit-id').value;
    const name = document.getElementById('edit-name').value.trim();
    const desc = document.getElementById('edit-desc').value.trim();

    if (!name) { showToast('Name cannot be empty', 'error'); return; }

    try {
      const res = await fetch(`${API}/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description: desc }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);

      closeModal('edit-overlay');
      showToast('File updated', 'success');
      loadMedia();
    } catch (e) {
      showToast('Update failed: ' + e.message, 'error');
    }
  }

  // ── DELETE ────────────────────────────────────────────
  function openDelete(id, name) {
    document.getElementById('delete-id').value = id;
    document.getElementById('delete-name').textContent = name;
    openModal('delete-overlay');
  }

  async function doDelete() {
    const id = document.getElementById('delete-id').value;
    try {
      const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);

      closeModal('delete-overlay');
      showToast('File deleted', 'success');
      loadMedia();
    } catch (e) {
      showToast('Delete failed: ' + e.message, 'error');
    }
  }

  // ── MODAL HELPERS ─────────────────────────────────────
  function openModal(id) {
    document.getElementById(id).classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = '';
    // Stop video if view modal
    if (id === 'view-overlay') {
      const vid = document.querySelector('#view-media-wrap video');
      if (vid) vid.pause();
    }
  }

  function overlayClick(e, id) {
    if (e.target.id === id) closeModal(id);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      ['upload-overlay','edit-overlay','delete-overlay','view-overlay'].forEach(id => {
        if (document.getElementById(id).classList.contains('open')) closeModal(id);
      });
    }
  });

  // ── TOAST ─────────────────────────────────────────────
  function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  }

  // ── UTILS ─────────────────────────────────────────────
  function formatBytes(bytes) {
    if (!bytes) return '—';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
